<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Interactive Strength Cloud Graph</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/upphiminn/jLouvain@master/jLouvain.js"></script>
  <style>
    body { 
      margin:0; 
      font-family: system-ui, sans-serif; 
      background:#f8f9fa; 
      overflow:hidden; 
    }
    svg { 
      width:100vw; 
      height:calc(100vh - 160px); 
      background:#ffffff; 
    }
    .controls {
      position: absolute; 
      top: 10px; 
      left: 10px; 
      background: white; 
      padding: 14px; 
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.12); 
      z-index: 100; 
      width: 300px;
      font-size: 0.95em;
    }
    .controls h3 { margin: 0 0 12px 0; }
    label { display: block; margin: 10px 0 4px; font-weight: 500; }
    input[type="range"] { width: 100%; }
    button { 
      padding: 8px 12px; 
      margin: 6px 4px 6px 0; 
      border: none; 
      border-radius: 6px; 
      background: #0066ff; 
      color: white; 
      cursor: pointer;
    }
    button:hover { background: #0052cc; }
    button#reloadBtn { background: #28a745; }
    button#reloadBtn:hover { background: #218838; }
    .node { cursor: grab; }
    circle { stroke: #fff; stroke-width: 2.5px; }
    text { 
      font: 600 13px system-ui, sans-serif; 
      fill: #fff; 
      text-anchor: middle; 
      dominant-baseline: middle; 
      pointer-events: none; 
    }
  </style>
</head>
<body>
  <div class="controls">
    <h3>Strength Cloud Controls</h3>
    
    <label>Global Edge Strength Multiplier: <span id="multVal">1.0</span></label>
    <input type="range" id="multiplier" min="0.1" max="3" step="0.05" value="1">

    <label>Louvain Resolution: <span id="resVal">1.0</span></label>
    <input type="range" id="resolution" min="0.5" max="3" step="0.1" value="1">

    <div>
      <button id="recolorBtn">Detect Communities (Louvain)</button>
      <button id="randomBtn">Randomize Strengths</button>
      <button id="reloadBtn">Reload Data</button>
    </div>
  </div>

  <svg id="svg"></svg>

  <script>
    let nodes = [];
    let links = [];
    let simulation = null;
    let nodeGroups = null;

    const svg = d3.select("#svg");
    const color = d3.scaleOrdinal(d3.schemeTableau10);

    const width = () => window.innerWidth;
    const height = () => window.innerHeight - 160;

    // ====================== LOAD DATA FROM data.json ======================
    function loadData() {
      d3.json("data.json").then(data => {
        nodes = data.nodes.map(d => ({ ...d }));
        links = data.links.map(d => ({ ...d }));
        
        console.log(`Loaded ${nodes.length} nodes and ${links.length} links`);
        
        initializeGraph();
      }).catch(err => {
        console.error("Failed to load data.json", err);
        alert("Could not load data.json\n\nMake sure the file exists in the same folder as index.html");
      });
    }

    // ====================== DRAW & SIMULATION ======================
    function initializeGraph() {
      svg.selectAll("*").remove();
      
      // Update SVG size
      svg.attr("width", width()).attr("height", height());

      nodeGroups = svg.append("g")
        .selectAll("g")
        .data(nodes)
        .enter().append("g")
          .attr("class", "node")
          .call(d3.drag()
            .on("start", dragStarted)
            .on("drag", dragged)
            .on("end", dragEnded));

      nodeGroups.append("circle")
        .attr("r", 34)
        .attr("fill", d => color(d.group ?? d.id));

      nodeGroups.append("text")
        .text(d => d.name || d.id);

      restartSimulation();
    }

    function restartSimulation() {
      if (simulation) simulation.stop();

      const mult = +document.getElementById("multiplier").value;

      simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links)
          .id(d => d.id)
          .strength(d => (d.strength || 0.5) * mult)
          .distance(75))
        .force("charge", d3.forceManyBody().strength(-680).distanceMax(450))
        .force("collision", d3.forceCollide().radius(40))
        .force("center", d3.forceCenter(width()/2, height()/2))
        .alphaDecay(0.022);

      simulation.on("tick", () => {
        nodeGroups.attr("transform", d => `translate(${d.x || 0},${d.y || 0})`);
      });

      simulation.alpha(0.7).restart();
    }

    // ====================== LOUVAIN COMMUNITY DETECTION ======================
    function runLouvain() {
      if (nodes.length === 0) return;

      const nodeIds = nodes.map(n => n.id);
      const edgeData = links.map(l => ({
        source: typeof l.source === "object" ? l.source.id : l.source,
        target: typeof l.target === "object" ? l.target.id : l.target,
        weight: (l.strength || 0.5) * 100
      }));

      const community = jLouvain()
        .nodes(nodeIds)
        .edges(edgeData)
        .resolution(+document.getElementById("resolution").value);

      const partition = community();

      nodes.forEach(node => {
        node.group = partition[node.id] ?? 0;
      });

      // Update colors
      nodeGroups.select("circle").attr("fill", d => color(d.group));
      
      restartSimulation(); // re-layout with new groups
    }

    // ====================== DRAG HANDLERS ======================
    function dragStarted(event) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      event.subject.fx = event.subject.x;
      event.subject.fy = event.subject.y;
    }
    function dragged(event) {
      event.subject.fx = event.x;
      event.subject.fy = event.y;
    }
    function dragEnded(event) {
      if (!event.active) simulation.alphaTarget(0);
      event.subject.fx = null;
      event.subject.fy = null;
    }

    // ====================== CONTROLS ======================
    document.getElementById("multiplier").addEventListener("input", e => {
      document.getElementById("multVal").textContent = (+e.target.value).toFixed(1);
      if (simulation) {
        simulation.force("link").strength(d => (d.strength || 0.5) * +e.target.value);
        simulation.alpha(0.3).restart();
      }
    });

    document.getElementById("resolution").addEventListener("input", e => {
      document.getElementById("resVal").textContent = (+e.target.value).toFixed(1);
    });

    document.getElementById("recolorBtn").addEventListener("click", runLouvain);
    
    document.getElementById("randomBtn").addEventListener("click", () => {
      links.forEach(l => l.strength = Math.random() * 0.9 + 0.1);
      restartSimulation();
    });

    document.getElementById("reloadBtn").addEventListener("click", () => {
      loadData();   // Reload from data.json
    });

    // ====================== INITIAL LOAD & RESIZE ======================
    loadData();

    window.addEventListener("resize", () => {
      if (simulation) {
        svg.attr("width", width()).attr("height", height());
        simulation.force("center", d3.forceCenter(width()/2, height()/2));
        simulation.alpha(0.3).restart();
      }
    });

    console.log("✅ Interactive Strength Cloud Graph with external data.json is ready!");
  </script>
</body>
</html>
