<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Interactive Strength Cloud Graph</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { margin:0; font-family: system-ui, sans-serif; background:#f8f9fa; overflow:hidden; }
    svg { width:100vw; height:calc(100vh - 190px); background:#ffffff; }
    .controls {
      position: absolute; top: 10px; left: 10px; background: white; padding: 14px; 
      border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.12); z-index: 100; 
      width: 340px; font-size: 0.95em;
    }
    label { display: block; margin: 10px 0 4px; font-weight: 500; }
    input[type="range"] { width: 100%; }
    button { padding: 8px 12px; margin: 6px 4px 6px 0; border: none; border-radius: 6px; 
             background: #0066ff; color: white; cursor: pointer; }
    button:hover { background: #0052cc; }
    button#reloadBtn { background: #28a745; }
    button#reloadBtn:hover { background: #218838; }
    .node { cursor: grab; }
    circle { stroke: #fff; stroke-width: 2.5px; }
    text { font: 600 13px system-ui, sans-serif; fill: #fff; text-anchor: middle; 
           dominant-baseline: middle; pointer-events: none; }
  </style>
</head>
<body>
  <div class="controls">
    <h3>Strength Cloud Controls</h3>
    
    <label>Global Edge Strength Multiplier: <span id="multVal">1.0</span></label>
    <input type="range" id="multiplier" min="0.1" max="3" step="0.05" value="1">

    <label>Target Number of Communities: <span id="commVal">4</span></label>
    <input type="range" id="numCommunities" min="2" max="10" step="1" value="4">

    <div>
      <button id="recolorBtn">Detect Communities & Recolor</button>
      <button id="randomBtn">Randomize Strengths</button>
      <button id="reloadBtn">Reload Data</button>
    </div>
    <small style="color:#666; display:block; margin-top:8px;">
      Tip: Increase strengths in data.json (>0.6) for clearer groups
    </small>
  </div>

  <svg id="svg"></svg>

  <script>
    let nodes = [];
    let links = [];
    let simulation = null;
    let nodeGroups = null;

    const svg = d3.select("#svg");
    const color = d3.scaleOrdinal(d3.schemeTableau10);

    const getWidth = () => window.innerWidth;
    const getHeight = () => window.innerHeight - 190;

    // ====================== LOAD DATA ======================
    function loadData() {
      d3.json("data.json").then(data => {
        nodes = data.nodes.map(d => ({ ...d, group: undefined }));
        links = data.links.map(d => ({ ...d }));
        console.log(`Loaded ${nodes.length} nodes and ${links.length} links`);
        initializeGraph();
      }).catch(err => {
        console.error(err);
        alert("Could not load data.json — check the file exists and is valid JSON.");
      });
    }

    // ====================== IMPROVED COMMUNITY DETECTION ======================
    function detectCommunities(targetK) {
      if (nodes.length < 2) return;

      // Build weighted adjacency
      const adj = {};
      nodes.forEach(n => adj[n.id] = {});
      links.forEach(l => {
        const s = typeof l.source === "object" ? l.source.id : l.source;
        const t = typeof l.target === "object" ? l.target.id : l.target;
        const w = Math.max(0.01, (l.strength || 0.5) * 20); // stronger scaling helps
        adj[s][t] = (adj[s][t] || 0) + w;
        adj[t][s] = (adj[t][s] || 0) + w;
      });

      // Phase 1: Greedy local optimization (core of Louvain-like)
      let community = nodes.map((_, i) => i); // start with each node in own community

      let improved = true;
      let iterations = 0;
      while (improved && iterations < 25) {
        improved = false;
        iterations++;
        for (let i = 0; i < nodes.length; i++) {
          const nodeId = nodes[i].id;
          const currentComm = community[i];

          const neighborCommCount = {};
          Object.keys(adj[nodeId] || {}).forEach(nbId => {
            const nbIdx = nodes.findIndex(n => n.id === nbId);
            if (nbIdx === -1) return;
            const nbComm = community[nbIdx];
            neighborCommCount[nbComm] = (neighborCommCount[nbComm] || 0) + adj[nodeId][nbId];
          });

          if (Object.keys(neighborCommCount).length === 0) continue;

          // Find best community
          let bestComm = currentComm;
          let bestGain = 0;
          Object.keys(neighborCommCount).forEach(c => {
            const gain = neighborCommCount[c];
            if (gain > bestGain) {
              bestGain = gain;
              bestComm = parseInt(c);
            }
          });

          if (bestComm !== currentComm) {
            community[i] = bestComm;
            improved = true;
          }
        }
      }

      // Phase 2: Reduce to targetK communities by merging smallest
      let groupMap = {};
      community.forEach((c, i) => {
        groupMap[c] = groupMap[c] || [];
        groupMap[c].push(i);
      });

      let groups = Object.values(groupMap);
      while (groups.length > targetK) {
        // Merge two smallest groups
        groups.sort((a, b) => a.length - b.length);
        const smallest = groups.shift();
        groups[0] = groups[0].concat(smallest);
      }

      // Assign final group IDs (0 to targetK-1)
      nodes.forEach((node, i) => {
        for (let g = 0; g < groups.length; g++) {
          if (groups[g].includes(i)) {
            node.group = g;
            break;
          }
        }
      });

      // Update node colors
      if (nodeGroups) {
        nodeGroups.select("circle").attr("fill", d => color(d.group));
      }

      console.log(`Detected ${groups.length} communities`);
    }

    // ====================== DRAW & SIMULATION ======================
    function initializeGraph() {
      svg.selectAll("*").remove();
      svg.attr("width", getWidth()).attr("height", getHeight());

      nodeGroups = svg.append("g")
        .selectAll("g")
        .data(nodes)
        .enter().append("g")
          .attr("class", "node")
          .call(d3.drag()
            .on("start", dragStarted)
            .on("drag", dragged)
            .on("end", dragEnded));

      nodeGroups.append("circle").attr("r", 34).attr("fill", d => color(d.group ?? Math.random()*10|0));
      nodeGroups.append("text").text(d => d.name || d.id);

      restartSimulation();
    }

    function restartSimulation() {
      if (simulation) simulation.stop();

      const mult = +document.getElementById("multiplier").value;

      simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links)
          .id(d => d.id)
          .strength(d => (d.strength || 0.5) * mult)
          .distance(80))
        .force("charge", d3.forceManyBody().strength(-750).distanceMax(500))
        .force("collision", d3.forceCollide().radius(42))
        .force("center", d3.forceCenter(getWidth()/2, getHeight()/2))
        .alphaDecay(0.018);

      simulation.on("tick", () => {
        nodeGroups.attr("transform", d => `translate(${d.x || 0}, ${d.y || 0})`);
      });

      simulation.alpha(0.8).restart();
    }

    function dragStarted(event) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      event.subject.fx = event.subject.x;
      event.subject.fy = event.subject.y;
    }
    function dragged(event) {
      event.subject.fx = event.x;
      event.subject.fy = event.y;
    }
    function dragEnded(event) {
      if (!event.active) simulation.alphaTarget(0);
      event.subject.fx = null;
      event.subject.fy = null;
    }

    // ====================== CONTROLS ======================
    document.getElementById("multiplier").addEventListener("input", e => {
      document.getElementById("multVal").textContent = (+e.target.value).toFixed(1);
      if (simulation) {
        simulation.force("link").strength(d => (d.strength || 0.5) * +e.target.value);
        simulation.alpha(0.3).restart();
      }
    });

    document.getElementById("numCommunities").addEventListener("input", e => {
      document.getElementById("commVal").textContent = e.target.value;
    });

    document.getElementById("recolorBtn").addEventListener("click", () => {
      const target = +document.getElementById("numCommunities").value;
      detectCommunities(target);
      restartSimulation();   // re-layout helps groups separate visually
    });

    document.getElementById("randomBtn").addEventListener("click", () => {
      links.forEach(l => l.strength = 0.2 + Math.random() * 0.8);
      restartSimulation();
    });

    document.getElementById("reloadBtn").addEventListener("click", loadData);

    // Initial load
    loadData();

    window.addEventListener("resize", () => {
      if (simulation) {
        svg.attr("width", getWidth()).attr("height", getHeight());
        simulation.force("center", d3.forceCenter(getWidth()/2, getHeight()/2)).alpha(0.4).restart();
      }
    });
  </script>
</body>
</html>
